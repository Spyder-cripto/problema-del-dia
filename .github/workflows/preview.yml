name: Preview del día

on:
  schedule:
    - cron: "10 22 * * *"   # ~00:10 Madrid (horario de verano)
    - cron: "10 23 * * *"   # ~00:10 Madrid (horario de invierno)
  workflow_dispatch:         # permite lanzarlo a mano

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 fonts-dejavu-core
          python -m pip install --quiet pillow cairosvg

      - name: Generar preview.png del día
        run: python generate_preview.py

      - name: Subir si ha cambiado
        run: |
          git config user.name "preview-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview.png preview_sq.png index.html
          if git diff --cached --quiet; then
            echo "Sin cambios en preview.png"
          else
            git commit -m "Preview automático del problema del día"
            git push
          fi
