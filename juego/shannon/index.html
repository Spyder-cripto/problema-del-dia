<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Juego de Shannon · El problema del día</title>
<meta name="description" content="Juega al Juego de Shannon (conmutación sobre un grafo): Short reclama aristas para unir A con B, Cut las borra para separarlos. El clásico de Claude Shannon resuelto por Lehman, con IA y pista.">
<link rel="stylesheet" href="../_engine/style.css">
<style>
  /* --- aristas del grafo --- */
  #board .edge{ stroke-width:6; stroke-linecap:round; }
  #board .edge.free{ stroke:var(--line); }
  #board .edge.short{ stroke:var(--azul); }
  #board .edge.cut{ stroke:var(--rojo); stroke-dasharray:3 9; opacity:.7; }

  /* fantasmas de jugada (aristas libres clicables) */
  #board .eghost{ stroke-width:14; stroke-linecap:round; cursor:pointer; opacity:.12; transition:opacity .12s; }
  #board .eghost:hover{ opacity:.5; }
  #board .eghost.g0{ stroke:var(--azul); }
  #board .eghost.g1{ stroke:var(--rojo); }

  /* halo de pista sobre una arista */
  #board .ehalo{ stroke:var(--accent); stroke-width:16; stroke-linecap:round; fill:none;
    opacity:.5; animation:ehalo 1.1s ease-in-out infinite; }
  @keyframes ehalo{ 0%,100%{opacity:.20} 50%{opacity:.85} }

  /* --- nodos --- */
  #board .node{ fill:var(--card); stroke:var(--muted); stroke-width:2; }
  #board .node.term{ fill:var(--accent); stroke:var(--accent); }
  #board .nlabel{ fill:#fff; font-family:var(--display); font-weight:700; font-size:18px;
    dominant-baseline:middle; pointer-events:none; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="main.js"></script>
</body>
</html>
