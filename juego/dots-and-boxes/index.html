<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puntos y Cajas · El problema del día</title>
<meta name="description" content="Juega a Puntos y Cajas (Dots and Boxes): traza aristas, cierra cajas y vuelve a jugar. Con IA que resuelve los finales de forma exacta (el doble trato) y «¿quién gana?» perfecto en el 3×3.">
<link rel="stylesheet" href="../_engine/style.css">
<style>
  #board{ background:color-mix(in srgb,var(--accent) 7%,var(--card)); }
  @media(prefers-color-scheme:dark){ #board{ background:color-mix(in srgb,var(--accent) 14%,var(--card)); } }
  /* aristas trazadas */
  #board .edge{ stroke:var(--ink); stroke-width:5; stroke-linecap:round; }
  #board .edge.last{ stroke:var(--accent); }
  /* cajas cerradas (color del dueño) */
  #board .box{ opacity:.5; }
  #board .box.b0{ fill:var(--accent-2); }
  #board .box.b1{ fill:var(--hard); }
  #board .boxlab{ fill:#fff; font-weight:700; font-size:20px; text-anchor:middle; dominant-baseline:central; pointer-events:none; }
  /* puntos */
  #board .dot{ fill:var(--ink); }
  /* pista */
  #board .hintedge{ stroke:var(--accent); stroke-width:6; stroke-linecap:round; opacity:.85; animation:halo 1.1s ease-in-out infinite; }
  /* zonas-clic invisibles, anchas para acertar fácil; se tiñen al pasar */
  #board .hit{ stroke:transparent; stroke-width:18; stroke-linecap:round; cursor:pointer; }
  #board .hit:hover{ stroke:color-mix(in srgb,var(--accent) 45%,transparent); }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="main.js"></script>
</body>
</html>
