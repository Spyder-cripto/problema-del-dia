<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quoridor · El problema del día</title>
<meta name="description" content="Juega a Quoridor: corre tu peón al otro lado del tablero y planta muros para alargarle el camino al rival, sin encerrarlo nunca. El clásico de Gigamic, con IA de pathfinding y pista.">
<link rel="stylesheet" href="../_engine/style.css">
<style>
  #board .goal0{ fill:color-mix(in srgb,var(--azul) 13%,var(--cell)); }
  #board .goal1{ fill:color-mix(in srgb,var(--rojo) 13%,var(--cell)); }
  #board .piece0{ stroke:color-mix(in srgb,var(--azul) 60%,#000); stroke-width:1.5; }
  #board .piece1{ stroke:color-mix(in srgb,var(--rojo) 60%,#000); stroke-width:1.5; }
  /* Muros colocados: barra sólida color madera/oro. */
  #board .wall{ fill:var(--accent); stroke:color-mix(in srgb,var(--accent) 60%,#000); stroke-width:.6; }
  #board .hintwall{ opacity:.5; animation:halo 1.1s ease-in-out infinite; }
  /* Ranuras de muro clicables: invisibles, se ven al pasar el ratón. */
  #board .wallslot{ fill:var(--accent); opacity:0; cursor:pointer; transition:opacity .1s; }
  #board .wallslot:hover{ opacity:.55; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="main.js"></script>
</body>
</html>
