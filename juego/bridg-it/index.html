<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bridg-It · El problema del día</title>
<meta name="description" content="Juega a Bridg-It, el juego de conexión de David Gale: Azul tiende puentes para unir arriba y abajo, Rojo para unir izquierda y derecha, y cada puente bloquea al rival. Con IA y pista de la jugada.">
<link rel="stylesheet" href="../_engine/style.css">
<style>
  /* puntos de las dos rejillas */
  #board .dot{stroke:var(--card);stroke-width:1.5}
  #board .dot.piece0{fill:var(--azul)}
  #board .dot.piece1{fill:var(--rojo)}

  /* puentes ya tendidos */
  #board .bridge{stroke-linecap:round}
  #board .bridge0{stroke:var(--azul);stroke-width:9}
  #board .bridge1{stroke:var(--rojo);stroke-width:9}

  /* fantasmas (jugadas legales) clicables */
  #board .ghost{stroke-linecap:round;stroke-width:9;cursor:pointer;opacity:.16;transition:opacity .12s}
  #board .ghost:hover{opacity:.6}
  #board .ghost.g0{stroke:var(--azul)}
  #board .ghost.g1{stroke:var(--rojo)}

  /* halo de pista */
  #board .halo{stroke:var(--accent);stroke-width:15;stroke-linecap:round;fill:none;opacity:.5;animation:halo 1.1s ease-in-out infinite}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="main.js"></script>
</body>
</html>
