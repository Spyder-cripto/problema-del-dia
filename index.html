<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El problema matemático del día</title>
<style>
  :root{
    --bg:#f3efe6; --bg2:#ece5d6; --card:#fffdf8; --ink:#2b2620; --muted:#857c6e;
    --accent:#9a6f2e; --accent-2:#1f5fa6; --line:#e4ddcd; --ok:#2e6f4f; --hard:#c0432f;
    --grid:rgba(154,111,46,.06);
    --shadow:0 12px 32px rgba(60,45,20,.11), 0 2px 6px rgba(60,45,20,.06);
    --display:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
    --body:Georgia,'Times New Roman',serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15130f; --bg2:#1d1913; --card:#211e18; --ink:#ece6da; --muted:#a59b89;
           --accent:#d8b06b; --accent-2:#83b3ec; --line:#332e25; --ok:#79cda1; --hard:#e6735f;
           --grid:rgba(216,176,107,.05);
           --shadow:0 14px 36px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3); }
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body); color:var(--ink); margin:0; line-height:1.72; font-size:18px;
    padding:36px 16px 72px;
    background:
      linear-gradient(var(--grid) 1px,transparent 1px) 0 0/28px 28px,
      linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/28px 28px,
      radial-gradient(125% 80% at 50% 0%, var(--bg2), var(--bg));
  }
  .wrap{max-width:680px; margin:0 auto}

  header{text-align:center; margin-bottom:26px}
  .kicker{text-transform:uppercase; letter-spacing:.3em; font-size:.7rem; font-weight:600;
          color:var(--accent); margin-bottom:12px}
  h1{font-family:var(--display); font-weight:600; font-size:2.2rem; line-height:1.08;
     margin:0 0 8px; letter-spacing:-.01em}
  .tagline{color:var(--muted); font-size:1rem; font-style:italic}
  .divider{display:flex; align-items:center; justify-content:center; gap:14px;
           margin:20px auto 0; max-width:240px; color:var(--accent)}
  .divider::before,.divider::after{content:""; height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--line))}
  .divider::after{background:linear-gradient(90deg,var(--line),transparent)}

  .meta{display:flex; justify-content:space-between; align-items:center; margin:0 4px 12px; gap:12px}
  .fecha{color:var(--muted); font-size:.92rem; text-transform:capitalize; font-style:italic}
  .num{font-family:var(--display); font-weight:600; font-size:.78rem; color:#fff; white-space:nowrap;
       background:var(--accent); padding:6px 14px; border-radius:999px; letter-spacing:.03em;
       box-shadow:0 2px 8px rgba(154,111,46,.4)}

  .card{position:relative; background:var(--card); border:1px solid var(--line); border-radius:18px;
        padding:30px 30px 26px; box-shadow:var(--shadow); overflow:hidden;
        animation:rise .55s cubic-bezier(.2,.7,.3,1) both}
  .card::before{content:""; position:absolute; inset:0 0 auto 0; height:4px;
        background:linear-gradient(90deg,var(--accent),var(--accent-2))}
  .card::after{content:"?"; position:absolute; right:-6px; bottom:-44px; font-family:var(--display);
        font-size:160px; font-weight:600; color:var(--accent); opacity:.05; line-height:1; pointer-events:none}
  @keyframes rise{from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:none}}

  .fuente{display:inline-flex; align-items:center; gap:6px; font-size:.74rem; font-style:italic;
          color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 9%,transparent);
          border:1px solid color-mix(in srgb,var(--accent-2) 22%,transparent);
          border-radius:999px; padding:4px 12px}
  .badges{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:16px}
  .tipo{display:inline-flex; align-items:center; font-size:.74rem; font-weight:500; letter-spacing:.02em;
        color:#fff; background:var(--accent); border-radius:999px; padding:4px 12px}
  .t-geo{background:#1f5fa6} .t-num{background:#2e7d4f} .t-log{background:#7a4ea6}
  .t-prob{background:#c46a1f} .t-comb{background:#b03a6e} .t-ing{background:#9a6f2e}
  .titulo-row{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:0 0 16px}
  .titulo-row h2{margin:0}
  .dif{white-space:nowrap; font-size:.8rem; letter-spacing:3px; flex:none; cursor:help}
  .dif.d1{color:var(--ok)} .dif.d2{color:var(--accent)} .dif.d3{color:var(--hard)}
  h2{font-family:var(--display); font-weight:600; font-size:1.55rem; margin:0 0 16px; line-height:1.2}
  .enun{font-size:1.08rem}

  button{font-family:var(--body); cursor:pointer}
  .verbtn{margin-top:24px; display:inline-flex; align-items:center; gap:8px; color:#fff; border:none;
    background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 68%,#000));
    border-radius:11px; padding:12px 20px; font-size:1rem; font-weight:500;
    box-shadow:0 4px 14px rgba(154,111,46,.33); transition:transform .15s, box-shadow .15s}
  .verbtn:hover{transform:translateY(-1px); box-shadow:0 7px 18px rgba(154,111,46,.42)}
  .verbtn:active{transform:translateY(0)}
  .acciones{display:flex; gap:10px; flex-wrap:wrap; margin-top:24px}
  .acciones .verbtn{margin-top:0}
  .pistabtn{display:inline-flex; align-items:center; gap:8px; font-size:1rem; font-weight:500;
    color:var(--accent-2); background:none; border:1px solid color-mix(in srgb,var(--accent-2) 45%,transparent);
    border-radius:11px; padding:12px 18px; transition:border-color .15s, background .15s}
  .pistabtn:hover{border-color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 8%,transparent)}

  .sol-wrap{display:grid; grid-template-rows:0fr; margin-top:0;
            transition:grid-template-rows .38s ease, margin-top .38s ease}
  .sol-wrap.show{grid-template-rows:1fr; margin-top:20px}
  .sol{overflow:hidden}
  .sol-inner{padding:18px 20px; border-left:4px solid var(--ok); border-radius:0 10px 10px 0;
             background:color-mix(in srgb,var(--ok) 9%,transparent); font-size:1.04rem}
  .sol-inner b{color:var(--ok)}
  .sol-label{display:flex; align-items:center; gap:7px; font-family:var(--display); font-weight:600;
             color:var(--ok); margin-bottom:6px; font-size:.95rem}
  .pista-inner{border-left-color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 9%,transparent)}
  .pista-label{color:var(--accent-2)}

  nav{display:flex; justify-content:center; align-items:center; gap:10px; margin-top:26px}
  nav button{background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:999px; padding:9px 18px; font-size:.92rem;
    transition:border-color .15s, color .15s, transform .1s}
  nav button:hover:not(:disabled){border-color:var(--accent); color:var(--accent); transform:translateY(-1px)}
  nav button:disabled{opacity:.3; cursor:default}
  .hoybtn{color:var(--accent-2); font-weight:600}

  .share{display:flex; justify-content:center; margin-top:16px}
  .share button{background:none; border:none; color:var(--muted); font-size:.88rem;
    display:inline-flex; gap:6px; align-items:center; text-decoration:underline; text-underline-offset:3px}
  .share button:hover{color:var(--accent)}

  footer{text-align:center; color:var(--muted); font-size:.82rem; margin-top:38px; line-height:1.6}
  footer a{color:var(--accent-2)}
  footer .heart{color:var(--accent)}

  @media (max-width:480px){
    body{font-size:17px; padding:24px 12px 56px}
    h1{font-size:1.72rem}
    .card{padding:24px 22px 22px}
    h2{font-size:1.32rem}
    .meta{flex-direction:column; align-items:flex-start; gap:6px}
  }

  .solfig{display:none; margin-top:16px}
  .solfig.show{display:block}
  .solfig svg{display:block; width:100%; height:auto; margin:0 auto;
    background:color-mix(in srgb,var(--card) 55%,transparent);
    border:1px solid var(--line); border-radius:10px; padding:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Matemática recreativa</div>
    <h1>El problema del día</h1>
    <div class="tagline">Un acertijo nuevo cada mañana, inspirado en Martin Gardner</div>
    <div class="divider"><span>∴</span></div>
  </header>

  <div class="meta">
    <span class="fecha" id="fecha"></span>
    <span class="num" id="num"></span>
  </div>

  <article class="card" id="card">
    <div class="badges">
      <span class="tipo" id="tipo"></span>
      <span class="fuente" id="fuente"></span>
    </div>
    <div class="titulo-row">
      <h2 id="titulo"></h2>
      <span class="dif" id="dif"></span>
    </div>
    <div class="enun" id="enun"></div>
    <div class="acciones">
      <button class="pistabtn" id="pistabtn"><span>💭</span> Pista</button>
      <button class="verbtn" id="verbtn"><span>💡</span> Ver solución</button>
    </div>
    <div class="sol-wrap pista-wrap" id="pistawrap">
      <div class="sol">
        <div class="sol-inner pista-inner">
          <div class="sol-label pista-label"><span>💭</span> Pista</div>
          <div id="pista"></div>
        </div>
      </div>
    </div>
    <div class="sol-wrap" id="solwrap">
      <div class="sol">
        <div class="sol-inner">
          <div class="sol-label">💡 Solución</div>
          <div id="sol"></div>
          <div class="solfig" id="solfig"></div>
        </div>
      </div>
    </div>
  </article>

  <nav>
    <button id="prev">◀ Anterior</button>
    <button id="hoy" class="hoybtn">Hoy</button>
    <button id="next">Siguiente ▶</button>
  </nav>

  <div class="share"><button id="share">🔗 Compartir el problema de hoy</button></div>

  <footer>
    Acertijos adaptados con redacción propia de la obra de <b>Martin Gardner</b>.<br>
    Publicación diaria automática · hecho con <span class="heart">cariño matemático</span>.
  </footer>
</div>

<script>
// ====== CONFIGURACIÓN ======
// Fecha de inicio de la serie (el día 1). Ajústala si quieres empezar otro día.
const INICIO = "2026-06-17";

// ====== PROBLEMAS (reescritos, citando la fuente) ======
const PROBLEMAS = [
  {
    titulo:"La cinta alrededor del mundo",
    fuente:"Matemática para divertirse",
    enun:"Imagina una cinta de acero que ciñe ajustada el ecuador de una esfera del tamaño del Sol. Le añadimos un solo metro de longitud y repartimos esa holgura por igual en todo el contorno, de modo que la cinta se separa la misma distancia de la superficie en todos los puntos. ¿Qué cabría por ese hueco: una hoja de papel, una mano, una pelota? ¿Y si la esfera fuese una naranja?",
    sol:"El hueco mide unos <b>15,9 cm</b>… ¡y es el mismo para el Sol que para la naranja! Al sumar 1 m a la circunferencia, el radio crece en 1/(2π) ≈ 0,159 m, sin que importe el tamaño de la esfera. Cabe una pelota holgada.",
    fig:"<svg viewBox='0 0 220 205' xmlns='http://www.w3.org/2000/svg' style='max-width:240px'><circle cx='110' cy='112' r='70' style='fill:var(--accent);opacity:.10'/><circle cx='110' cy='112' r='70' style='fill:none;stroke:var(--muted);stroke-width:1.5'/><circle cx='110' cy='112' r='84' style='fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:5 4'/><line x1='110' y1='42' x2='110' y2='28' style='stroke:var(--ok);stroke-width:2.5'/><text x='118' y='25' style='fill:var(--ok);font-size:12px' font-family='Georgia,serif'>+15,9 cm</text><text x='110' y='116' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>astro</text><text x='110' y='200' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>el hueco no depende del tamaño del astro</text></svg>"
  },
  {
    titulo:"La barra de plata",
    fuente:"Matemática para divertirse",
    enun:"Tienes una barra de plata de 31 cm. Debes entregar 1 cm el primer día, 2 cm el segundo, y así hasta 31 cm el último; pero cada día puedes recibir cambio (devolver trozos ya entregados). ¿En cuántos pedazos, como mínimo, necesitas cortar la barra?",
    sol:"<b>Cinco</b>: de 1, 2, 4, 8 y 16 cm. Con esas potencias de dos puedes componer cualquier total de 1 a 31 entregando y recuperando piezas. Es el sistema binario disfrazado de problema cotidiano.",
    fig:"<svg viewBox='0 0 320 80' xmlns='http://www.w3.org/2000/svg' style='max-width:320px'><g style='stroke:var(--accent);fill:none;stroke-width:2'><rect x='20' y='26' width='9' height='30'/><rect x='29' y='26' width='18.1' height='30'/><rect x='47.1' y='26' width='36.1' height='30'/><rect x='83.2' y='26' width='72.3' height='30'/><rect x='155.5' y='26' width='144.5' height='30'/></g><g style='fill:var(--ink);font-size:12px;text-anchor:middle' font-family='Georgia,serif'><text x='24.5' y='20'>1</text><text x='38' y='20'>2</text><text x='65.1' y='45'>4</text><text x='119.3' y='45'>8</text><text x='227.7' y='45'>16</text></g><text x='160' y='73' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>1 + 2 + 4 + 8 + 16 = 31 cm</text></svg>"
  },
  {
    titulo:"La mosca y las bicicletas",
    fuente:"Matemática para divertirse",
    enun:"Dos ciclistas separados por 20 km avanzan al encuentro, cada uno a 10 km/h. Una mosca parte del manillar de uno a 15 km/h, llega al otro, da media vuelta, regresa… y así sin descanso hasta que las ruedas se tocan. ¿Cuántos kilómetros recorre la mosca en total?",
    sol:"<b>15 km.</b> No hace falta sumar infinitos tramos: los ciclistas tardan exactamente 1 hora en encontrarse, y la mosca vuela a 15 km/h durante esa hora. El truco está en cambiar la pregunta de «distancia» por «tiempo»."
  },
  {
    titulo:"La herencia de las ovejas",
    fuente:"Miscelánea matemática",
    enun:"Dos hermanos venden su rebaño y reciben por cada oveja tantos euros como ovejas tenían. Cobran en billetes de 10 €, salvo un último resto menor de 10 € que reciben en monedas. Se reparten los billetes alternándose, y resulta que al mayor le tocan el primero y el último. Para compensar, el mayor da al menor las monedas y, como aún no basta, le firma un cheque que iguala exactamente las partes. ¿De cuánto es el cheque?",
    sol:"<b>De 2 €.</b> El total es n² (n = número de ovejas). Que el mayor cobre un billete de más obliga a que la cifra de las decenas de n² sea impar, y eso solo ocurre si n termina en 4 o en 6 — en ambos casos n² acaba en 6. Así que el resto en monedas fue de 6 €. El menor sigue 4 € por detrás; la mitad de esa diferencia es el cheque: 2 €."
  },
  {
    titulo:"La mesa de mentirosos",
    fuente:"Miscelánea matemática",
    enun:"Alrededor de una mesa redonda, cada comensal es siempre veraz o siempre mentiroso. Preguntados uno a uno, todos afirman: «mi vecino de la izquierda es un mentiroso». El presidente asegura que eran 37; el secretario, que tacha al presidente de mentiroso, dice que eran 40. ¿Cuántos había en realidad?",
    sol:"<b>40.</b> Si todos llaman mentiroso a su vecino, veraces y mentirosos tienen que <i>alternarse</i> alrededor de la mesa, lo que exige un número <b>par</b> de comensales. 37 es impar, luego el presidente miente; y el secretario, que lo desmiente, dice la verdad: 40."
  },
  {
    titulo:"La proporción de sexos",
    fuente:"Miscelánea matemática",
    enun:"Un gobernante decreta que cada familia siga teniendo hijos mientras nazcan niñas, y se detenga en cuanto nazca un varón. Con el paso de las generaciones, ¿acabará habiendo más mujeres que hombres en el país? (Cada nacimiento es niño o niña al 50 %.)",
    sol:"<b>No: la proporción se mantiene 1:1.</b> La regla cambia el tamaño de las familias, pero no la probabilidad de cada nacimiento, que sigue siendo mitad y mitad. De hecho, cada familia termina con exactamente un varón. La intuición engaña; la aritmética no."
  },
  {
    titulo:"El número del año",
    fuente:"Los mágicos números del doctor Matrix",
    enun:"Los 365 días del año esconden una simetría notable que enlaza cinco cuadrados consecutivos. ¿Sabrías encontrarla?",
    sol:"<b>10² + 11² + 12² = 13² + 14² = 365.</b> (100+121+144 = 169+196 = 365.) Es un eslabón de una familia infinita de igualdades que arranca con el mismísimo 3² + 4² = 5²."
  },
  {
    titulo:"La pelota imposible",
    fuente:"Juegos y enigmas de otros mundos",
    enun:"Una pelota ideal rebota cada vez más alto: el primer bote sube 1/2 metro, y cada bote siguiente sube 1/n de metro más (es decir, 1/3, 1/4, 1/5… de metro). Sin rozamiento ni límite alguno, ¿podría llegar algún día a un kilómetro de altura?",
    sol:"<b>Sí.</b> La altura acumulada es 1/2 + 1/3 + 1/4 + 1/5 + … , la <i>serie armónica</i>, que crece sin tope. Agrupando sus términos, se obtienen infinitos grupos que suman más de 1/2 cada uno, así que con suficientes botes se supera cualquier altura imaginable."
  },
  {
    titulo:"La estrella que no se deja deformar",
    fuente:"Juegos y enigmas de otros mundos",
    enun:"Dibuja una estrella de cinco puntas, todo lo torcida e irregular que quieras. ¿Podrías conseguir que la suma de sus cinco ángulos se aparte, aunque sea un grado, de los 180°?",
    sol:"<b>No: siempre suman exactamente 180°.</b> Una demostración preciosa: desliza una cerilla a lo largo del contorno, haciéndola girar en cada punta hasta alinearla con el lado siguiente. Al completar la vuelta habrá dado <i>media vuelta justa</i> (180°), que es precisamente la suma de los cinco giros.",
    fig:"<svg viewBox='0 0 200 210' xmlns='http://www.w3.org/2000/svg' style='max-width:210px'><circle cx='100' cy='95' r='80' style='fill:none;stroke:var(--line);stroke-width:1;stroke-dasharray:4 4'/><path d='M100,15 L147,159.7 L23.9,70.3 L176.1,70.3 L53,159.7 Z' style='fill:var(--accent);opacity:.08'/><path d='M100,15 L147,159.7 L23.9,70.3 L176.1,70.3 L53,159.7 Z' style='fill:none;stroke:var(--accent);stroke-width:2;stroke-linejoin:round'/><text x='100' y='202' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>los 5 ángulos suman siempre 180°</text></svg>"
  },
  {
    titulo:"El anillo de Neptuno",
    fuente:"Cuentos con acertijos de Ciencia Ficción",
    enun:"Una nave cruza en línea recta un anillo formado por dos círculos concéntricos: entra por el borde exterior, roza tangente el círculo interior y vuelve a salir por el exterior. Ese trayecto recto mide 200.000 km. ¿Cuál es el área del anillo… aunque nadie te diga cuánto valen los radios?",
    sol:"<b>π × (100.000)² km².</b> Por el teorema de Pitágoras, R² − r² = (mitad de la cuerda)², de modo que el área del anillo, π(R² − r²), depende <i>solo</i> de la cuerda. Los radios desconocidos se cancelan como por arte de magia.",
    fig:"<svg viewBox='0 0 240 210' xmlns='http://www.w3.org/2000/svg' style='max-width:260px'><circle cx='120' cy='115' r='90' style='fill:none;stroke:var(--ink);stroke-width:1.5'/><circle cx='120' cy='115' r='52' style='fill:none;stroke:var(--muted);stroke-width:1.5;stroke-dasharray:4 4'/><line x1='46.5' y1='63' x2='193.5' y2='63' style='stroke:var(--accent);stroke-width:2'/><line x1='120' y1='115' x2='120' y2='63' style='stroke:var(--muted);stroke-width:1.5'/><line x1='120' y1='115' x2='193.5' y2='63' style='stroke:var(--accent-2);stroke-width:2'/><rect x='120' y='63' width='8' height='8' style='fill:none;stroke:var(--muted);stroke-width:1'/><g style='font-size:12px' font-family='Georgia,serif'><text x='124' y='95' style='fill:var(--ink)'>r</text><text x='158' y='82' style='fill:var(--accent-2)'>R</text><text x='148' y='57' style='fill:var(--accent)'>AC/2</text><text x='110' y='119' style='fill:var(--ink)'>O</text><text x='34' y='60' style='fill:var(--ink)'>A</text><text x='197' y='60' style='fill:var(--ink)'>C</text></g><text x='120' y='200' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>R² − r² = (AC/2)²  →  área = π·(AC/2)²</text></svg>"
  },
  {
    titulo:"El número que se describe a sí mismo",
    fuente:"Circo Matemático",
    enun:"Escribe un número de diez cifras, con posiciones numeradas del 0 al 9. La cifra de la posición 0 debe indicar cuántos ceros tiene el número en total; la de la posición 1, cuántos unos; la de la posición 2, cuántos doses… y así hasta la posición 9, que dirá cuántos nueves contiene. Solo existe una solución. ¿Cuál es?",
    sol:"<b>6.210.001.000.</b> Compruébalo: contiene seis 0, dos 1, un 2 y un 6, y cada cifra coincide exactamente con el recuento que anuncia su posición. Un número que se retrata a sí mismo… y encima es único."
  },
  {
    titulo:"Misioneros y caníbales",

// ====== ORDEN DE PUBLICACIÓN ======
// Secuencia día -> índice en PROBLEMAS, diseñada para que los TIPOS se alternen
// (nunca dos problemas de geometría en días consecutivos). Si añades nuevos
// problemas al final de PROBLEMAS, se publican igualmente: se anexan solos al
// final de la secuencia (aunque para mantener la alternancia, lo ideal es
// insertar su índice en ORDEN en la posición adecuada).
const ORDEN = [3,20,16,25,23,24,17,26,29,27,28,0,1,4,2,8,5,6,12,9,7,10,11,18,22,14,21,19,15,13];
const SEQ = ORDEN.concat(PROBLEMAS.map((_,i)=>i).filter(i=>!ORDEN.includes(i)));

// Tipo (categoría) de cada problema, por su índice en PROBLEMAS. Se muestra como etiqueta.
const TIPO = {0:"Geometría",1:"Números",2:"Ingenio",3:"Números",4:"Lógica",5:"Probabilidad",6:"Números",7:"Ingenio",8:"Geometría",9:"Geometría",10:"Números",11:"Lógica",12:"Combinatoria",13:"Lógica",14:"Números",15:"Ingenio",16:"Ingenio",17:"Lógica",18:"Geometría",19:"Geometría",20:"Geometría",21:"Probabilidad",22:"Combinatoria",23:"Ingenio",24:"Probabilidad",25:"Números",26:"Ingenio",27:"Lógica",28:"Combinatoria",29:"Números"};
const CLASE_TIPO = {"Geometría":"t-geo","Números":"t-num","Lógica":"t-log","Probabilidad":"t-prob","Combinatoria":"t-comb","Ingenio":"t-ing"};
// Dificultad: 1 fácil, 2 media, 3 difícil (por índice en PROBLEMAS).
const DIF = {0:2,1:2,2:2,3:3,4:2,5:3,6:1,7:3,8:2,9:2,10:3,11:2,12:2,13:2,14:1,15:1,16:2,17:3,18:3,19:3,20:2,21:3,22:3,23:1,24:2,25:3,26:2,27:2,28:1,29:1};
const DIF_NOMBRE = {1:"Fácil",2:"Media",3:"Difícil"};
// Pistas: solo para problemas de dificultad media o difícil (por índice en PROBLEMAS).
const PISTAS = {
  0:"No calcules con el tamaño del astro: fíjate solo en cuánto crece el radio cuando la longitud aumenta 1 metro. ¿Aparece el tamaño original en esa cuenta?",
  1:"¿Qué conjunto de piezas permite formar cualquier cantidad entera, dando y devolviendo trozos? Piensa en cómo cuenta un ordenador.",
  2:"No sumes los infinitos tramos de la mosca. Pregúntate cuánto tiempo tardan las bicicletas en encontrarse.",
  3:"El dinero total es un cuadrado perfecto (n² euros). Casi todo sale de pensar bien cómo puede ser ese cuadrado.",
  4:"Si cada uno llama mentiroso a su vecino, ¿cómo se alternan veraces y mentirosos alrededor de la mesa? ¿Qué exige eso del número de comensales?",
  5:"Cada nacimiento sigue siendo 50/50 hagan lo que hagan las familias. ¿Cambia eso la regla de parar al tener un varón?",
  7:"La altura total es 1/2 + 1/3 + 1/4 + … Agrupa los términos (1/3+1/4, luego 1/5+1/6+1/7+1/8, …): ¿cuánto suma cada grupo como mínimo?",
  8:"Imagina recorrer el contorno girando en cada punta hasta el lado siguiente. ¿Cuánto has girado en total al volver al inicio?",
  9:"Traza el radio hasta el punto de tangencia y forma un triángulo rectángulo con media cuerda. Pitágoras: ¿qué relación queda entre R, r y la cuerda?",
  10:"La suma de las diez cifras tiene que ser 10. Empieza por tantear cuántos ceros hay: si hay muchos, la primera cifra es grande.",
  11:"La gracia está en los viajes de vuelta: a veces alguien debe regresar para no dejar mayoría de caníbales en una orilla. Prueba a empezar pasando dos caníbales.",
  12:"¿Cuántos trozos añade cada corte nuevo? Cuenta a cuántos cortes anteriores cruza.",
  13:"Suma cuántas manos estrechó cada persona. Como cada apretón se cuenta dos veces, esa suma es par. ¿Qué implica para los que saludaron un número impar de veces?",
  16:"Calcula cuánto tiempo tendrías disponible para promediar 20 km/h… y compáralo con el que ya gastaste en la primera vuelta.",
  17:"Con búsqueda binaria, ¿cuántos análisis hacen falta para 128 vasos? ¿Y para 129? Piensa cuándo gastar un análisis en un único vaso NO te cuesta nada de más.",
  18:"Olvida la trigonometría. Busca triángulos rectángulos semejantes dentro de la figura: los dos ángulos pequeños 'caben' justos dentro del grande.",
  19:"Mientras esté muy cerca del centro, ella puede girar alrededor de él más rápido (en ángulo) que el hombre por la orilla. ¿Hasta qué radio le dura esa ventaja?",
  20:"Las dos tangentes trazadas desde un mismo punto exterior miden lo mismo. Aplica esa idea en A, en B y en C.",
  21:"Si una de las dos personas 'desanda' su camino, ¿en qué se convierte la separación entre ambas? Y recuerda: la distancia típica tras n pasos al azar es √n.",
  22:"No te fíes de 1, 2, 4, 8, 16. Dibuja con cuidado el caso de 6 puntos y cuenta las regiones de verdad, una a una…",
  24:"Solo hay 6 maneras de repartir tres resguardos. Cuenta a mano en cuántas acierta al menos uno (o resta las que no acierta nadie).",
  25:"Escribe las potencias de n en base n: ¿qué forma tienen? Luego fíjate en cómo queda la suma de dos de ellas en esa misma base.",
  26:"El truco es que la tostadora no esté nunca a medio llenar. Una rebanada puede salir y volver más tarde para su segunda cara.",
  27:"¿Qué responde a «¿eres veraz?» un mentiroso? ¿Y un veraz? Compara las dos respuestas y verás que la traducción del nativo bajo tiene que ser cierta."
};

// ====== LÓGICA ======
const MS=86400000;
function aMedianoche(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
const inicio = aMedianoche(new Date(INICIO + "T00:00:00"));
const hoyIdx = Math.max(0, Math.floor((aMedianoche(new Date()) - inicio)/MS));
let viewIdx = hoyIdx;

const fmt = new Intl.DateTimeFormat('es-ES',{weekday:'long', day:'numeric', month:'long', year:'numeric'});
function problemaDe(i){ const N=SEQ.length; return PROBLEMAS[SEQ[((i%N)+N)%N]]; }

function render(){
  const N = SEQ.length;
  const idx = SEQ[((viewIdx%N)+N)%N];
  const p = PROBLEMAS[idx];
  const fecha = new Date(inicio.getTime() + viewIdx*MS);
  document.getElementById('fecha').textContent = fmt.format(fecha);
  document.getElementById('num').textContent = "Nº " + (viewIdx+1);
  const tEl = document.getElementById('tipo');
  tEl.textContent = TIPO[idx] || "";
  tEl.className = "tipo " + (CLASE_TIPO[TIPO[idx]] || "");
  const d = DIF[idx] || 2;
  const dEl = document.getElementById('dif');
  dEl.textContent = "●".repeat(d) + "○".repeat(3 - d);
  dEl.className = "dif d" + d;
  dEl.title = "Dificultad: " + DIF_NOMBRE[d];
  document.getElementById('fuente').textContent = "Adaptado de: " + p.fuente;
  document.getElementById('titulo').textContent = p.titulo;
  document.getElementById('enun').textContent = p.enun;
  document.getElementById('sol').innerHTML = p.sol;
  const fig = document.getElementById('solfig');
  if(p.fig){ fig.innerHTML = p.fig; fig.classList.add('show'); }
  else { fig.innerHTML=''; fig.classList.remove('show'); }
  document.getElementById('solwrap').classList.remove('show');
  document.getElementById('verbtn').innerHTML = "<span>💡</span> Ver solución";
  // pista (solo en dificultad media o difícil)
  const pistaBtn = document.getElementById('pistabtn');
  const tienePista = !!PISTAS[idx];
  pistaBtn.style.display = tienePista ? "" : "none";
  if(tienePista) document.getElementById('pista').innerHTML = PISTAS[idx];
  document.getElementById('pistawrap').classList.remove('show');
  pistaBtn.innerHTML = "<span>💭</span> Pista";
  document.getElementById('prev').disabled = (viewIdx<=0);
  document.getElementById('next').disabled = (viewIdx>=hoyIdx);
  document.getElementById('hoy').disabled = (viewIdx===hoyIdx);
  // re-lanzar la animación de entrada de la tarjeta
  const c = document.getElementById('card');
  c.style.animation='none'; void c.offsetWidth; c.style.animation='';
}
document.getElementById('verbtn').onclick = ()=>{
  const w=document.getElementById('solwrap'), b=document.getElementById('verbtn');
  const abierto = w.classList.toggle('show');
  b.innerHTML = abierto ? "<span>🙈</span> Ocultar solución" : "<span>💡</span> Ver solución";
};
document.getElementById('pistabtn').onclick = ()=>{
  const w=document.getElementById('pistawrap'), b=document.getElementById('pistabtn');
  const abierto = w.classList.toggle('show');
  b.innerHTML = abierto ? "<span>🙈</span> Ocultar pista" : "<span>💭</span> Pista";
};
document.getElementById('prev').onclick = ()=>{ if(viewIdx>0){viewIdx--; render();} };
document.getElementById('next').onclick = ()=>{ if(viewIdx<hoyIdx){viewIdx++; render();} };
document.getElementById('hoy').onclick = ()=>{ viewIdx=hoyIdx; render(); };
document.getElementById('share').onclick = async ()=>{
  const p=problemaDe(viewIdx);
  const url = location.href.split('#')[0];
  const b = document.getElementById('share');
  try{
    if(navigator.share){ await navigator.share({title:"🧩 "+p.titulo, text:"El problema matemático del día", url}); }
    else { await navigator.clipboard.writeText(url); const t=b.textContent; b.textContent="✅ ¡Enlace copiado!"; setTimeout(()=>b.textContent=t,1800); }
  }catch(e){}
};
render();
</script>

</html>
