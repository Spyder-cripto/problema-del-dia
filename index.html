<style>
  :root{
    --bg:#f3efe6; --bg2:#ece5d6; --card:#fffdf8; --ink:#2b2620; --muted:#857c6e;
    --accent:#9a6f2e; --accent-2:#1f5fa6; --line:#e4ddcd; --ok:#2e6f4f; --hard:#c0432f;
    --grid:rgba(154,111,46,.06);
    --shadow:0 12px 32px rgba(60,45,20,.11), 0 2px 6px rgba(60,45,20,.06);
    --display:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
    --body:Georgia,'Times New Roman',serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15130f; --bg2:#1d1913; --card:#211e18; --ink:#ece6da; --muted:#a59b89;
           --accent:#d8b06b; --accent-2:#83b3ec; --line:#332e25; --ok:#79cda1; --hard:#e6735f;
           --grid:rgba(216,176,107,.05);
           --shadow:0 14px 36px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3); }
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body); color:var(--ink); margin:0; line-height:1.72; font-size:18px;
    padding:36px 16px 72px;
    background:
      linear-gradient(var(--grid) 1px,transparent 1px) 0 0/28px 28px,
      linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/28px 28px,
      radial-gradient(125% 80% at 50% 0%, var(--bg2), var(--bg));
  }
  .wrap{max-width:680px; margin:0 auto}

  header{text-align:center; margin-bottom:26px}
  .kicker{text-transform:uppercase; letter-spacing:.3em; font-size:.7rem; font-weight:600;
          color:var(--accent); margin-bottom:12px}
  h1{font-family:var(--display); font-weight:600; font-size:2.2rem; line-height:1.08;
     margin:0 0 8px; letter-spacing:-.01em}
  .tagline{color:var(--muted); font-size:1rem; font-style:italic}
  .divider{display:flex; align-items:center; justify-content:center; gap:14px;
           margin:20px auto 0; max-width:240px; color:var(--accent)}
  .divider::before,.divider::after{content:""; height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--line))}
  .divider::after{background:linear-gradient(90deg,var(--line),transparent)}

  .meta{display:flex; justify-content:space-between; align-items:center; margin:0 4px 12px; gap:12px}
  .fecha{color:var(--muted); font-size:.92rem; font-style:italic}
  .num{font-family:var(--display); font-weight:600; font-size:.78rem; color:#fff; white-space:nowrap;
       background:var(--accent); padding:6px 14px; border-radius:999px; letter-spacing:.03em;
       box-shadow:0 2px 8px rgba(154,111,46,.4)}

  .card{position:relative; background:var(--card); border:1px solid var(--line); border-radius:18px;
        padding:30px 30px 26px; box-shadow:var(--shadow); overflow:hidden;
        animation:rise .55s cubic-bezier(.2,.7,.3,1) both}
  .card::before{content:""; position:absolute; inset:0 0 auto 0; height:4px;
        background:linear-gradient(90deg,var(--accent),var(--accent-2))}
  .card::after{content:"?"; position:absolute; right:-6px; bottom:-44px; font-family:var(--display);
        font-size:160px; font-weight:600; color:var(--accent); opacity:.05; line-height:1; pointer-events:none}
  @keyframes rise{from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:none}}

  .fuente{display:inline-flex; align-items:center; gap:6px; font-size:.74rem; font-style:italic;
          color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 9%,transparent);
          border:1px solid color-mix(in srgb,var(--accent-2) 22%,transparent);
          border-radius:999px; padding:4px 12px}
  .badges{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:20px}
  .tipo{display:inline-flex; align-items:center; font-size:.74rem; font-weight:500; letter-spacing:.02em;
        color:#fff; background:var(--accent); border-radius:999px; padding:4px 12px}
  .t-geo{background:#1f5fa6} .t-num{background:#2e7d4f} .t-log{background:#7a4ea6}
  .t-prob{background:#c46a1f} .t-comb{background:#b03a6e} .t-ing{background:#9a6f2e}
  .titulo-row{display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 0 16px}
  .titulo-row h2{margin:0}
  .titulo-left{display:flex; align-items:center; gap:14px; min-width:0}
  .dibujo{flex:none; width:56px; height:56px; transform:rotate(-4deg)}
  .dibujo svg{width:100%; height:100%; display:block; filter:drop-shadow(0 2px 3px rgba(60,45,20,.18))}
  @media (max-width:480px){ .dibujo{width:46px; height:46px} }
  .dif{white-space:nowrap; font-size:.8rem; letter-spacing:3px; flex:none; cursor:help}
  .dif.d1{color:var(--ok)} .dif.d2{color:var(--accent)} .dif.d3{color:var(--hard)}
  .dif-wrap{display:inline-flex; align-items:center; gap:6px}
  .dif-label{font-size:.8rem; color:var(--muted)}
  h2{font-family:var(--display); font-weight:600; font-size:1.55rem; margin:0 0 16px; line-height:1.2}
  .enun{font-size:1.08rem}

  button{font-family:var(--body); cursor:pointer}
  .verbtn{margin-top:24px; display:inline-flex; align-items:center; gap:8px; color:#fff; border:none;
    background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 68%,#000));
    border-radius:11px; padding:12px 20px; font-size:1rem; font-weight:500;
    box-shadow:0 4px 14px rgba(154,111,46,.33); transition:transform .15s, box-shadow .15s}
  .verbtn:hover{transform:translateY(-1px); box-shadow:0 7px 18px rgba(154,111,46,.42)}
  .verbtn:active{transform:translateY(0)}
  .acciones{display:flex; gap:10px; flex-wrap:wrap; margin-top:24px}
  .acciones .verbtn{margin-top:0}
  .pistabtn{display:inline-flex; align-items:center; gap:8px; font-size:1rem; font-weight:500;
    color:var(--accent-2); background:none; border:1px solid color-mix(in srgb,var(--accent-2) 45%,transparent);
    border-radius:11px; padding:12px 18px; transition:border-color .15s, background .15s}
  .pistabtn:hover{border-color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 8%,transparent)}

  .sol-wrap{display:grid; grid-template-rows:0fr; margin-top:0;
            transition:grid-template-rows .38s ease, margin-top .38s ease}
  .sol-wrap.show{grid-template-rows:1fr; margin-top:20px}
  .sol{overflow:hidden}
  .sol-inner{padding:18px 20px; border-left:4px solid var(--ok); border-radius:0 10px 10px 0;
             background:color-mix(in srgb,var(--ok) 9%,transparent); font-size:1.04rem}
  .sol-inner b{color:var(--ok)}
  .sol-label{display:flex; align-items:center; gap:7px; font-family:var(--display); font-weight:600;
             color:var(--ok); margin-bottom:6px; font-size:.95rem}
  .pista-inner{border-left-color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 9%,transparent)}
  .pista-label{color:var(--accent-2)}
  .pista-item + .pista-item{margin-top:8px}
  .pista-item b{color:var(--accent-2)}

  nav{display:flex; justify-content:center; align-items:center; gap:10px; margin-top:26px}
  nav button{background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:999px; padding:9px 18px; font-size:.92rem;
    transition:border-color .15s, color .15s, transform .1s}
  nav button:hover:not(:disabled){border-color:var(--accent); color:var(--accent); transform:translateY(-1px)}
  nav button:disabled{opacity:.3; cursor:default}
  .hoybtn{color:var(--accent-2); font-weight:600}

  .share{display:flex; justify-content:center; margin-top:16px}
  .share button{background:none; border:none; color:var(--muted); font-size:.88rem;
    display:inline-flex; gap:6px; align-items:center; text-decoration:underline; text-underline-offset:3px}
  .share button:hover{color:var(--accent)}

  footer{text-align:center; color:var(--muted); font-size:.82rem; margin-top:38px; line-height:1.6}
  footer a{color:var(--accent-2)}
  footer .heart{color:var(--accent)}

  @media (max-width:480px){
    body{font-size:17px; padding:24px 12px 56px}
    h1{font-size:1.72rem}
    .card{padding:24px 22px 22px}
    h2{font-size:1.32rem}
    .meta{flex-direction:column; align-items:flex-start; gap:6px}
  }

  .solfig{display:none; margin-top:16px}
  .solfig.show{display:block}
  .solfig svg{display:block; width:100%; height:auto; margin:0 auto;
    background:color-mix(in srgb,var(--card) 55%,transparent);
    border:1px solid var(--line); border-radius:10px; padding:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Matemática recreativa</div>
    <h1>El problema del día</h1>
    <div class="tagline">Un acertijo nuevo cada mañana, inspirado en Martin Gardner</div>
    <div class="divider"><span>∴</span></div>
  </header>

  <div class="meta">
    <span class="fecha" id="fecha"></span>
    <span class="num" id="num"></span>
  </div>

  <article class="card" id="card">
    <div class="titulo-row">
      <div class="titulo-left">
        <span class="dibujo" id="dibujo" aria-hidden="true"></span>
        <h2 id="titulo"></h2>
      </div>
    </div>
    <div class="enun" id="enun"></div>
    <div class="badges">
      <span class="tipo" id="tipo"></span>
      <span class="dif-wrap"><span class="dif-label">Dificultad:</span><span class="dif" id="dif"></span></span>
    </div>
    <div class="acciones">
      <button class="pistabtn" id="pistabtn1"><span>💭</span> Pista 1</button>
      <button class="pistabtn" id="pistabtn2"><span>💭</span> Pista 2</button>
      <button class="verbtn" id="verbtn"><span>💡</span> Ver solución</button>
    </div>
    <div class="sol-wrap pista-wrap" id="pistawrap1">
      <div class="sol">
        <div class="sol-inner pista-inner">
          <div class="sol-label pista-label" id="pistalabel1"><span>💭</span> Pista</div>
          <div id="pista1"></div>
        </div>
      </div>
    </div>
    <div class="sol-wrap pista-wrap" id="pistawrap2">
      <div class="sol">
        <div class="sol-inner pista-inner">
          <div class="sol-label pista-label"><span>💭</span> Pista 2</div>
          <div id="pista2"></div>
        </div>
      </div>
    </div>
    <div class="sol-wrap" id="solwrap">
      <div class="sol">
        <div class="sol-inner">
          <div class="sol-label">💡 Solución</div>
          <div id="sol"></div>
          <div class="solfig" id="solfig"></div>
        </div>
      </div>
    </div>
  </article>

  <nav>
    <button id="prev">◀ Anterior</button>
    <button id="hoy" class="hoybtn">Hoy</button>
    <button id="next">Siguiente ▶</button>
  </nav>

  <div class="share"><button id="share">🔗 Compartir el problema de hoy</button></div>

  <footer>
    Acertijos adaptados con redacción propia de la obra de <b>Martin Gardner</b>.<br>
    Publicación diaria automática · hecho con <span class="heart">cariño matemático</span>.
  </footer>
</div>

<script>
// ====== CONFIGURACIÓN ======
// Fecha de inicio de la serie (el día 1). Ajústala si quieres empezar otro día.
const INICIO = "2026-06-17";

// ====== PROBLEMAS (reescritos, citando la fuente) ======
const PROBLEMAS = [
  {
    titulo:"La cinta alrededor del mundo",
    fuente:"Matemática para divertirse",
    enun:"Imagina una cinta de acero que ciñe ajustada el ecuador de una esfera del tamaño del Sol. Le añadimos un solo metro de longitud y repartimos esa holgura por igual en todo el contorno, de modo que la cinta se separa la misma distancia de la superficie en todos los puntos. ¿Qué cabría por ese hueco: una hoja de papel, una mano, una pelota? ¿Y si la esfera fuese una naranja?",
    sol:"El hueco mide unos <b>15,9 cm</b>… ¡y es el mismo para el Sol que para la naranja! Al sumar 1 m a la circunferencia, el radio crece en 1/(2π) ≈ 0,159 m, sin que importe el tamaño de la esfera. Cabe una pelota holgada.",

  },
  {
    titulo:"La barra de plata",
    fuente:"Matemática para divertirse",
    enun:"Tienes una barra de plata de 31 cm. Debes entregar 1 cm el primer día, 2 cm el segundo, y así hasta 31 cm el último; pero cada día puedes recibir cambio (devolver trozos ya entregados). ¿En cuántos pedazos, como mínimo, necesitas cortar la barra?",
    sol:"<b>Cinco</b>: de 1, 2, 4, 8 y 16 cm. Con esas potencias de dos puedes componer cualquier total de 1 a 31 entregando y recuperando piezas. Es el sistema binario disfrazado de problema cotidiano.",
    fig:"<svg viewBox='0 0 320 80' xmlns='http://www.w3.org/2000/svg' style='max-width:320px'><g style='stroke:var(--accent);fill:none;stroke-width:2'><rect x='20' y='26' width='9' height='30'/><rect x='29' y='26' width='18.1' height='30'/><rect x='47.1' y='26' width='36.1' height='30'/><rect x='83.2' y='26' width='72.3' height='30'/><rect x='155.5' y='26' width='144.5' height='30'/></g><g style='fill:var(--ink);font-size:12px;text-anchor:middle' font-family='Georgia,serif'><text x='24.5' y='20'>1</text><text x='38' y='20'>2</text><text x='65.1' y='45'>4</text><text x='119.3' y='45'>8</text><text x='227.7' y='45'>16</text></g><text x='160' y='73' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>1 + 2 + 4 + 8 + 16 = 31 cm</text></svg>"
  },
  {
    titulo:"La mosca y las bicicletas",
    fuente:"Matemática para divertirse",
    enun:"Dos ciclistas separados por 20 km avanzan al encuentro, cada uno a 10 km/h. Una mosca parte del manillar de uno a 15 km/h, llega al otro, da media vuelta, regresa… y así sin descanso hasta que las ruedas se tocan. ¿Cuántos kilómetros recorre la mosca en total?",
    sol:"<b>15 km.</b> No hace falta sumar infinitos tramos: los ciclistas tardan exactamente 1 hora en encontrarse, y la mosca vuela a 15 km/h durante esa hora. El truco está en cambiar la pregunta de «distancia» por «tiempo»."
  },
  {
    titulo:"La herencia de las ovejas",
    fuente:"Miscelánea matemática",
    enun:"Dos hermanos venden su rebaño y reciben por cada oveja tantos euros como ovejas tenían. Cobran en billetes de 10 €, salvo un último resto menor de 10 € que reciben en monedas. Se reparten los billetes alternándose, y resulta que al mayor le tocan el primero y el último. Para compensar, el mayor da al menor las monedas y, como aún no basta, le firma un cheque que iguala exactamente las partes. ¿De cuánto es el cheque?",
    sol:"<b>De 2 €.</b> El total es n² (n = número de ovejas). Que el mayor cobre un billete de más obliga a que la cifra de las decenas de n² sea impar, y eso solo ocurre si n termina en 4 o en 6 — en ambos casos n² acaba en 6. Así que el resto en monedas fue de 6 €. El menor sigue 4 € por detrás; la mitad de esa diferencia es el cheque: 2 €."
  },
  {
    titulo:"La mesa de mentirosos",
    fuente:"Miscelánea matemática",
    enun:"Alrededor de una mesa redonda, cada comensal es siempre veraz o siempre mentiroso. Preguntados uno a uno, todos afirman: «mi vecino de la izquierda es un mentiroso». El presidente asegura que eran 37; el secretario, que tacha al presidente de mentiroso, dice que eran 40. ¿Cuántos había en realidad?",
    sol:"<b>40.</b> Si todos llaman mentiroso a su vecino, veraces y mentirosos tienen que <i>alternarse</i> alrededor de la mesa, lo que exige un número <b>par</b> de comensales. 37 es impar, luego el presidente miente; y el secretario, que lo desmiente, dice la verdad: 40."
  },
  {
    titulo:"La proporción de sexos",
    fuente:"Miscelánea matemática",

    sol:"<b>No: la proporción se mantiene 1:1.</b> La regla cambia el tamaño de las familias, pero no la probabilidad de cada nacimiento, que sigue siendo mitad y mitad. De hecho, cada familia termina con exactamente un varón. La intuición engaña; la aritmética no."

  {

    enun:"Los 365 días del año esconden una simetría notable que enlaza cinco cuadrados consecutivos. ¿Sabrías encontrarla?",
    sol:"<b>10² + 11² + 12² = 13² + 14² = 365.</b> (100+121+144 = 169+196 = 365.) Es un eslabón de una familia infinita de igualdades que arranca con el mismísimo 3² + 4² = 5²."
  },
  {
    titulo:"La pelota imposible",
    fuente:"Juegos y enigmas de otros mundos",
    enun:"Una pelota ideal rebota cada vez más alto: el primer bote sube 1/2 metro, y cada bote siguiente sube 1/n de metro más (es decir, 1/3, 1/4, 1/5… de metro). Sin rozamiento ni límite alguno, ¿podría llegar algún día a un kilómetro de altura?",
    sol:"<b>Sí.</b> La altura acumulada es 1/2 + 1/3 + 1/4 + 1/5 + … , la <i>serie armónica</i>, que crece sin tope. Agrupando sus términos, se obtienen infinitos grupos que suman más de 1/2 cada uno, así que con suficientes botes se supera cualquier altura imaginable."

  {

    enun:"Dibuja una estrella de cinco puntas, todo lo torcida e irregular que quieras. ¿Podrías conseguir que la suma de sus cinco ángulos se aparte, aunque sea un grado, de los 180°?",
    sol:"<b>No: siempre suman exactamente 180°.</b> Una demostración preciosa: desliza una cerilla a lo largo del contorno, haciéndola girar en cada punta hasta alinearla con el lado siguiente. Al completar la vuelta habrá dado <i>media vuelta justa</i> (180°), que es precisamente la suma de los cinco giros.",
    fig:"<svg viewBox='0 0 200 210' xmlns='http://www.w3.org/2000/svg' style='max-width:210px'><circle cx='100' cy='95' r='80' style='fill:none;stroke:var(--line);stroke-width:1;stroke-dasharray:4 4'/><path d='M100,15 L147,159.7 L23.9,70.3 L176.1,70.3 L53,159.7 Z' style='fill:var(--accent);opacity:.08'/><path d='M100,15 L147,159.7 L23.9,70.3 L176.1,70.3 L53,159.7 Z' style='fill:none;stroke:var(--accent);stroke-width:2;stroke-linejoin:round'/><text x='100' y='202' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>los 5 ángulos suman siempre 180°</text></svg>"
  },
  {
    titulo:"El anillo de Neptuno",
    fuente:"Cuentos con acertijos de Ciencia Ficción",
    enun:"Una nave cruza en línea recta un anillo formado por dos círculos concéntricos: entra por el borde exterior, roza tangente el círculo interior y vuelve a salir por el exterior. Ese trayecto recto mide 200.000 km. ¿Cuál es el área del anillo… aunque nadie te diga cuánto valen los radios?",
    sol:"<b>π × (100.000)² km².</b> Por el teorema de Pitágoras, R² − r² = (mitad de la cuerda)², de modo que el área del anillo, π(R² − r²), depende <i>solo</i> de la cuerda. Los radios desconocidos se cancelan como por arte de magia.",
    fig:"<svg viewBox='0 0 240 210' xmlns='http://www.w3.org/2000/svg' style='max-width:260px'><circle cx='120' cy='115' r='90' style='fill:none;stroke:var(--ink);stroke-width:1.5'/><circle cx='120' cy='115' r='52' style='fill:none;stroke:var(--muted);stroke-width:1.5;stroke-dasharray:4 4'/><line x1='46.5' y1='63' x2='193.5' y2='63' style='stroke:var(--accent);stroke-width:2'/><line x1='120' y1='115' x2='120' y2='63' style='stroke:var(--muted);stroke-width:1.5'/><line x1='120' y1='115' x2='193.5' y2='63' style='stroke:var(--accent-2);stroke-width:2'/><rect x='120' y='63' width='8' height='8' style='fill:none;stroke:var(--muted);stroke-width:1'/><g style='font-size:12px' font-family='Georgia,serif'><text x='124' y='95' style='fill:var(--ink)'>r</text><text x='158' y='82' style='fill:var(--accent-2)'>R</text><text x='148' y='57' style='fill:var(--accent)'>AC/2</text><text x='110' y='119' style='fill:var(--ink)'>O</text><text x='34' y='60' style='fill:var(--ink)'>A</text><text x='197' y='60' style='fill:var(--ink)'>C</text></g><text x='120' y='200' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>R² − r² = (AC/2)²  →  área = π·(AC/2)²</text></svg>"

  {

    fuente:"Circo Matemático",
    enun:"Escribe un número de diez cifras, con posiciones numeradas del 0 al 9. La cifra de la posición 0 debe indicar cuántos ceros tiene el número en total; la de la posición 1, cuántos unos; la de la posición 2, cuántos doses… y así hasta la posición 9, que dirá cuántos nueves contiene. Solo existe una solución. ¿Cuál es?",
    sol:"<b>6.210.001.000.</b> Compruébalo: contiene seis 0, dos 1, un 2 y un 6, y cada cifra coincide exactamente con el recuento que anuncia su posición. Un número que se retrata a sí mismo… y encima es único."

  {
    titulo:"Misioneros y caníbales",
    fuente:"Huevos, nudos y otras mistificaciones matemáticas",
    enun:"Tres misioneros y tres caníbales deben cruzar un río en una barca que solo lleva dos personas. El problema: si en alguna orilla los caníbales llegan a superar en número a los misioneros presentes, se los comen. ¿Pueden cruzar todos sanos y salvos? ¿En cuántas travesías como mínimo?",
    sol:"<b>Sí, en 11 travesías.</b> Una forma: (1) cruzan 2 caníbales, vuelve 1; (2) cruzan 2 caníbales, vuelve 1; (3) cruzan 2 misioneros, vuelven 1 misionero y 1 caníbal; (4) cruzan 2 misioneros, vuelve 1 caníbal; (5) cruzan 2 caníbales, vuelve 1; (6) cruzan los 2 caníbales restantes. En ningún momento los caníbales superan a los misioneros en una orilla."
  },
  {
    titulo:"Los cortes de la tarta",
    fuente:"Matemática para divertirse",
    enun:"Con un corte recto divides una tarta en 2 trozos. Con un segundo corte que cruce al primero obtienes 4; con un tercero bien colocado, 7. ¿Cuál es el máximo número de trozos que puedes conseguir con 6 cortes rectos?",
    sol:"<b>22 trozos.</b> Cada nuevo corte n.º k añade como mucho k trozos, porque cruza a los k−1 cortes previos y queda partido en k tramos, y cada tramo divide un trozo en dos. Así: 1 → 2 → 4 → 7 → 11 → 16 → <b>22</b>. En general, n cortes dan 1 + n(n+1)/2 trozos.",

  },
  {
    titulo:"El apretón de manos",
    fuente:"Cuentos con acertijos de Ciencia Ficción",
    enun:"En una reunión cualquiera, la gente se da la mano sin ningún orden. Demuestra que el número de personas que han estrechado la mano un número <i>impar</i> de veces es siempre <i>par</i>.",
    sol:"Suma cuántas manos estrechó cada persona. Como cada apretón implica a dos personas, esa suma total es necesariamente <b>par</b>. Quienes saludaron un número par de veces aportan una cantidad par; al restarla del total (par), lo que aportan los demás también es par. Pero una suma de números impares solo es par si hay una cantidad <b>par</b> de ellos. Por tanto, los que saludaron un número impar de veces son un número par de personas."
  },
  {
    titulo:"El número narcisista",
    fuente:"Los mágicos números del doctor Matrix",
    enun:"Busca un número de tres cifras que sea exactamente igual a la suma de los cubos de sus dígitos. (Para un número «abc» se calcula a³ + b³ + c³; por ejemplo, con 246 daría 2³ + 4³ + 6³ = 288, que no coincide.) ¿Cuántos números de tres cifras cumplen la condición?",
    sol:"Hay <b>cuatro</b>: 153, 370, 371 y 407. Por ejemplo, 1³ + 5³ + 3³ = 1 + 125 + 27 = <b>153</b>. Se llaman <i>números narcisistas</i>: entre los de tres cifras, estos son los únicos que se reconstruyen a sí mismos con los cubos de sus dígitos."
  },
  {
    titulo:"El microbio que llena el frasco",
    fuente:"Cuentos con acertijos de Ciencia Ficción",
    enun:"Metemos un único microbio en un frasco vacío. Cada hora, cada microbio se multiplica por siete. A las 50 horas el frasco está completamente lleno. ¿En qué hora estaba lleno justo a una séptima parte?",
    sol:"<b>A las 49 horas.</b> Como cada hora la población se multiplica por 7, una hora <i>antes</i> de estar lleno había exactamente la séptima parte. No hace falta calcular ninguna potencia: basta retroceder un paso. El truco está en mirar el problema hacia atrás."
  },
  {
    titulo:"La vuelta imposible",
    fuente:"Juegos y enigmas de otros mundos",
    enun:"Recorres una pista en bicicleta. La primera vuelta la das a 10 km/h. ¿A qué velocidad tienes que dar la segunda vuelta para que tu velocidad media en las dos vueltas sea de 20 km/h?",
    sol:"<b>Es imposible</b> — haría falta velocidad infinita. Para promediar 20 km/h en las dos vueltas, el tiempo total tendría que ser el de recorrer esa distancia a 20 km/h… pero ya lo has gastado <i>entero</i> en la primera vuelta a 10 km/h. No queda ni un segundo para la segunda. La velocidad media no es el promedio de las velocidades, sino la distancia total dividida por el tiempo total."
  },
  {
    titulo:"El vaso envenenado",
    fuente:"Miscelánea matemática",
    enun:"Hay entre 100 y 200 vasos en fila; exactamente uno está envenenado. Puedes analizar mezclas de varios vasos a la vez (cada análisis dice solo si el veneno está o no en esa mezcla). El profesor le dice al comisario: «Elija usted el vaso que prefiera; lo analizaremos a solas en primer lugar». Resulta que ese análisis suelto a un único vaso no aumenta el número total de análisis necesarios en el peor de los casos. ¿Cuántos vasos había exactamente?",
    sol:"<b>129.</b> La estrategia óptima es la búsqueda binaria: partir el grupo por la mitad en cada análisis. Con 7 análisis se distinguen hasta 128 vasos; para 129 o más hacen falta 8. Analizar un vaso suelto al principio solo NO desperdicia ese análisis cuando, al descartarlo, quedan exactamente 128 (resolubles en 7). Es decir, cuando hay 128 + 1 = <b>129</b> vasos. Con cualquier otra cantidad del rango, esa primera prueba suelta saldría perdiendo."
  },
  {
    titulo:"Los tres cuadrados",
    fuente:"Miscelánea matemática",
    enun:"Coloca tres cuadrados iguales en fila, pegados uno a otro. Desde la esquina inferior izquierda del primero, traza una recta a la esquina superior derecha de cada cuadrado: se forman tres ángulos con la base, llámalos α (el del primer cuadrado), β (el del segundo) y γ (el del tercero). Demuestra —sin usar trigonometría— que α = β + γ.",
    sol:"<b>α = β + γ</b> (y además α vale 45°). La demostración elegante es puramente visual: los lados de los cuadrados generan parejas de triángulos rectángulos <i>semejantes</i>, y al trasladar los ángulos β y γ con esos triángulos, encajan sin hueco hasta completar exactamente α. Ni una fórmula: solo ver cómo dos piezas iguales rellenan la tercera. En números, 45° = 26,57° + 18,43°.",
    fig:"<svg viewBox='0 0 320 155' xmlns='http://www.w3.org/2000/svg' style='max-width:320px'><g style='fill:none;stroke:var(--muted);stroke-width:1.5'><rect x='20' y='50' width='70' height='70'/><rect x='90' y='50' width='70' height='70'/><rect x='160' y='50' width='70' height='70'/></g><g style='stroke:var(--accent-2);stroke-width:2'><line x1='20' y1='120' x2='90' y2='50'/><line x1='20' y1='120' x2='160' y2='50'/><line x1='20' y1='120' x2='230' y2='50'/></g><g style='fill:var(--accent-2);font-size:13px' font-family='Georgia,serif'><text x='94' y='48'>α</text><text x='164' y='48'>β</text><text x='233' y='52'>γ</text></g><text x='160' y='148' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>α = β + γ   (45° = 26,57° + 18,43°)</text></svg>"
  },
  {
    titulo:"La dama del lago",
    fuente:"Miscelánea matemática",
    enun:"Una joven rema hasta el centro de un lago perfectamente circular para huir de un hombre que la espera en la orilla. En tierra ella corre más rápido que él, pero remando avanza cuatro veces más lenta de lo que él corre. Si consigue tocar la orilla antes de que él llegue a ese punto, se salva. ¿Qué estrategia geométrica le permite escapar?",
    sol:"Mientras esté a menos de un cuarto del radio del centro, ella puede <i>rotar</i> alrededor del centro más rápido (en ángulo) que el hombre corriendo por la orilla. Aprovecha eso para colocarse en el borde de ese círculo de radio r/4, justo en el punto diametralmente opuesto al hombre. Desde ahí le quedan 3r/4 hasta la orilla en línea recta; a él le queda media vuelta, πr ≈ 3,14·r. Como va a velocidad 4×, recorre 4·(3r/4) = 3r, menos que πr: ella llega antes y huye. La belleza está en cómo el número 4 encaja justo con π.",
    fig:"<svg viewBox='0 0 240 235' xmlns='http://www.w3.org/2000/svg' style='max-width:250px'><circle cx='120' cy='115' r='95' style='fill:var(--accent-2);opacity:.08'/><circle cx='120' cy='115' r='95' style='fill:none;stroke:var(--accent-2);stroke-width:2'/><circle cx='120' cy='115' r='24' style='fill:none;stroke:var(--muted);stroke-width:1.5;stroke-dasharray:4 4'/><circle cx='120' cy='115' r='2.5' style='fill:var(--ink)'/><path d='M205,115 A95,95 0 0 1 25,115' style='fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:5 4'/><line x1='96' y1='115' x2='25' y2='115' style='stroke:var(--ok);stroke-width:2.5'/><circle cx='205' cy='115' r='4' style='fill:var(--accent)'/><circle cx='25' cy='115' r='3.5' style='fill:var(--ok)'/><g style='font-size:12px' font-family='Georgia,serif'><text x='102' y='110' style='fill:var(--muted)'>r/4</text><text x='52' y='108' style='fill:var(--ok)'>ella</text><text x='150' y='38' style='fill:var(--accent)'>él (×4)</text></g><text x='120' y='228' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>rema en círculo de radio r/4 y sale por el lado opuesto</text></svg>"
  },
  {
    titulo:"El triángulo de perímetro fijo",
    fuente:"Miscelánea matemática",
    enun:"Desde un punto C exterior a una circunferencia trazas sus dos rectas tangentes, que la tocan en X e Y; cada tangente mide 10. Eliges un punto P cualquiera del arco XY y trazas la tangente por P, que corta a las dos rectas anteriores en A y B. ¿Cuánto mide el perímetro del triángulo ABC… y cuánto cambia al mover P?",
    sol:"Es siempre <b>20</b>, y no cambia nada al mover P. Clave: las dos tangentes desde un mismo punto exterior miden lo mismo. Desde A: AX = AP. Desde B: BY = BP. Entonces el perímetro AB + BC + CA = (AP+PB) + (CY−BY) + (CX−AX) = CX + CY = 10 + 10 = <b>20</b>. Lo que P añade por un lado se descuenta por el otro: un invariante perfecto.",
    fig:"<svg viewBox='0 0 280 200' xmlns='http://www.w3.org/2000/svg' style='max-width:290px'><circle cx='110' cy='100' r='55' style='fill:none;stroke:var(--muted);stroke-width:1.5'/><polygon points='165,64.3 165,135.7 245,100' style='fill:var(--accent);opacity:.10'/><g style='stroke:var(--accent-2);stroke-width:2;fill:none'><line x1='245' y1='100' x2='132.4' y2='49.7'/><line x1='245' y1='100' x2='132.4' y2='150.3'/></g><line x1='165' y1='64.3' x2='165' y2='135.7' style='stroke:var(--accent);stroke-width:2'/><g style='fill:var(--ink)' stroke='none'><circle cx='245' cy='100' r='3'/><circle cx='132.4' cy='49.7' r='2.5'/><circle cx='132.4' cy='150.3' r='2.5'/><circle cx='165' cy='100' r='2.5'/><circle cx='165' cy='64.3' r='2.5'/><circle cx='165' cy='135.7' r='2.5'/></g><g style='font-size:12px' font-family='Georgia,serif'><text x='250' y='104' style='fill:var(--ink)'>C</text><text x='120' y='47' style='fill:var(--ink)'>X</text><text x='120' y='162' style='fill:var(--ink)'>Y</text><text x='170' y='99' style='fill:var(--ink)'>P</text><text x='150' y='60' style='fill:var(--accent)'>A</text><text x='150' y='150' style='fill:var(--accent)'>B</text><text x='190' y='71' style='fill:var(--accent-2)'>10</text><text x='190' y='139' style='fill:var(--accent-2)'>10</text></g><text x='140' y='192' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>perímetro de ABC = 20, sea cual sea P</text></svg>"
  },
  {
    titulo:"La distancia del azar",
    fuente:"Circo Matemático",
    enun:"Dos personas parten del mismo punto. Una da 70 pasos en direcciones totalmente al azar (cada paso de longitud 1); la otra da 30 pasos, también al azar. Al terminar, ¿qué distancia cabe esperar que las separe?",
    sol:"<b>10 pasos.</b> Truco precioso: la separación entre los dos finales equivale a un único paseo aleatorio de 70 + 30 = 100 pasos (desandar el camino de una y encadenarlo con el de la otra da 100 pasos al azar). Y la distancia típica tras n pasos aleatorios es exactamente √n. Por tanto √100 = 10. Un problema que parece dificilísimo se resuelve casi sin cuentas.",
    fig:"<svg viewBox='0 0 300 185' xmlns='http://www.w3.org/2000/svg' style='max-width:300px'><polyline points='150,155 128,128 152,108 118,86 142,62 102,54 92,46' style='fill:none;stroke:var(--accent-2);stroke-width:2'/><polyline points='150,155 176,134 164,108 200,98 216,80 230,74' style='fill:none;stroke:var(--accent);stroke-width:2'/><line x1='92' y1='46' x2='230' y2='74' style='stroke:var(--ok);stroke-width:2;stroke-dasharray:5 4'/><g stroke='none'><circle cx='150' cy='155' r='3' style='fill:var(--ink)'/><circle cx='92' cy='46' r='3.5' style='fill:var(--accent-2)'/><circle cx='230' cy='74' r='3.5' style='fill:var(--accent)'/></g><g style='font-size:11px' font-family='Georgia,serif'><text x='150' y='170' style='fill:var(--muted);text-anchor:middle'>salida común</text><text x='66' y='40' style='fill:var(--accent-2)'>70 pasos</text><text x='234' y='68' style='fill:var(--accent)'>30 pasos</text><text x='150' y='40' style='fill:var(--ok);text-anchor:middle'>≈ 10</text></g><text x='150' y='182' style='fill:var(--muted);font-size:12px;text-anchor:middle' font-family='Georgia,serif'>distancia media = √(70+30) = √100 = 10</text></svg>"
  },
  {
    titulo:"El engaño de las potencias de dos",
    fuente:"Circo Matemático",
    enun:"Marca n puntos en una circunferencia y une cada par con un segmento recto (procurando que no se crucen tres en un mismo punto interior). El número máximo de regiones en que queda partido el círculo es 1, 2, 4, 8, 16 para n = 1, 2, 3, 4, 5… parece que se duplica cada vez. ¿Cuántas regiones salen con n = 6?",
    sol:"<b>31, no 32.</b> ¡La duplicación se rompe justo aquí! La sucesión 1, 2, 4, 8, 16 invita a creer en 2ⁿ⁻¹, pero la fórmula verdadera es 1 + C(n,2) + C(n,4); para n = 6 da 1 + 15 + 15 = 31. Es el aviso clásico de que cinco casos «obvios» no demuestran nada: la pauta más tentadora puede ser falsa.",
    fig:"<svg viewBox='0 0 330 110' xmlns='http://www.w3.org/2000/svg' style='max-width:330px' font-family='Georgia,serif'><g style='fill:none;stroke:var(--muted);stroke-width:1.5'><rect x='8' y='40' width='46' height='34' rx='6'/><rect x='61' y='40' width='46' height='34' rx='6'/><rect x='114' y='40' width='46' height='34' rx='6'/><rect x='167' y='40' width='46' height='34' rx='6'/><rect x='220' y='40' width='46' height='34' rx='6'/></g><rect x='273' y='40' width='46' height='34' rx='6' style='fill:none;stroke:var(--accent);stroke-width:2.5'/><g style='fill:var(--muted);font-size:10px;text-anchor:middle'><text x='31' y='32'>n=1</text><text x='84' y='32'>n=2</text><text x='137' y='32'>n=3</text><text x='190' y='32'>n=4</text><text x='243' y='32'>n=5</text><text x='296' y='32'>n=6</text></g><g style='fill:var(--ink);font-size:15px;text-anchor:middle'><text x='31' y='63'>1</text><text x='84' y='63'>2</text><text x='137' y='63'>4</text><text x='190' y='63'>8</text><text x='243' y='63'>16</text><text x='296' y='63' style='fill:var(--accent)'>31</text></g><text x='165' y='98' style='fill:var(--muted);font-size:12px;text-anchor:middle'>1, 2, 4, 8, 16 … ¿32?  →  31</text></svg>"
  },
  {
    titulo:"Tres gatos, cien ratones",
    fuente:"Matemática para divertirse",
    enun:"Si tres gatos cazan tres ratones en tres minutos, ¿cuántos gatos hacen falta para cazar 100 ratones en 100 minutos?",
    sol:"<b>Tres gatos.</b> La trampa es pensar que hacen falta 100. Pero «tres gatos, tres ratones, tres minutos» significa que entre los tres cazan un ratón por minuto. En 100 minutos, esos mismos tres gatos cazan 100 ratones. El número de gatos no cambia; lo único que cambia es el tiempo."
  },
  {
    titulo:"Los resguardos del guardarropa",
    fuente:"Juegos y enigmas de otros mundos",
    enun:"Tres personas dejan su abrigo en el guardarropa, pero el encargado mezcla los tres resguardos y los reparte al azar. ¿Qué probabilidad hay de que al menos una persona reciba su propio resguardo?",
    sol:"<b>2/3</b> (más de lo que sugiere la intuición). Hay 6 maneras de repartir los tres resguardos; en 4 de ellas al menos uno cae en su sitio, así que 4/6 = 2/3. Curiosidad bonita: es imposible que acierten <i>exactamente dos</i> (si dos están bien, el tercero también lo está). Y con muchísimas personas la probabilidad no tiende a cero, sino a 1 − 1/e ≈ 0,63."
  },
  {
    titulo:"La ecuación del genio",
    fuente:"Juegos y enigmas de otros mundos",
    enun:"Demuestra que nᵃ + nᵇ = nᶜ no tiene solución en enteros positivos cuando la base n es mayor que 2. (Dicho de otro modo: una potencia de n nunca es la suma de otras dos potencias de n, si n > 2.)",
    sol:"Mira los números en <b>base n</b>. Toda potencia de n se escribe como un 1 seguido de ceros (igual que 10, 100, 1000 en base 10). Si a = b, la suma nᵃ + nᵇ es «2 seguido de ceros»; para n > 2 ese 2 es un dígito válido, así que no es un 1-seguido-de-ceros: no es potencia de n. Si a ≠ b, la suma tiene <i>dos</i> unos en su escritura en base n: tampoco es potencia de n. En ambos casos, imposible. (Justo con n = 2 sí valdría: 2ᵃ + 2ᵃ = 2ᵃ⁺¹.)"
  },
  {
    titulo:"El truco de las tostadas",
    fuente:"Matemática para divertirse",
    enun:"Una tostadora antigua admite dos rebanadas a la vez, pero solo tuesta una cara de cada una; para la otra cara hay que sacarlas, darles la vuelta y volver a meterlas. Tostar una cara lleva exactamente un minuto. Quieres tostar las dos caras de tres rebanadas. Hacerlo «de dos en dos» lleva 4 minutos. ¿Se puede en menos?",
    sol:"<b>Sí, en 3 minutos.</b> Llama A, B, C a las rebanadas (cada una con cara 1 y 2). Minuto 1: tuesta A1 y B1; saca B y dale la vuelta, retira A y mete C. Minuto 2: tuesta B2 y C1; B ya está lista, da la vuelta a C y vuelve a meter A. Minuto 3: tuesta A2 y C2. ¡Las seis caras en 3 minutos! El truco: que la tostadora no tenga nunca un hueco vacío."
  },
  {

// ====== LÓGICA ======
const MS=86400000;
function aMedianoche(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
const inicio = aMedianoche(new Date(INICIO + "T00:00:00"));
const hoyIdx = Math.max(0, Math.floor((aMedianoche(new Date()) - inicio)/MS));
let viewIdx = hoyIdx;

const fmt = new Intl.DateTimeFormat('es-ES',{weekday:'long', day:'numeric', month:'long', year:'numeric'});
const capFecha = s => s.split(' ').map(w => w.toLowerCase()==='de' ? 'de' : w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
function problemaDe(i){ const N=SEQ.length; return PROBLEMAS[SEQ[((i%N)+N)%N]]; }

function render(){
  const N = SEQ.length;
  const idx = SEQ[((viewIdx%N)+N)%N];
  const p = PROBLEMAS[idx];
  const fecha = new Date(inicio.getTime() + viewIdx*MS);
  document.getElementById('fecha').textContent = capFecha(fmt.format(fecha));
  document.getElementById('num').textContent = "Nº " + (viewIdx+1);
  const tEl = document.getElementById('tipo');
  tEl.textContent = TIPO[idx] || "";
  tEl.className = "tipo " + (CLASE_TIPO[TIPO[idx]] || "");
  const d = DIF[idx] || 2;
  const dEl = document.getElementById('dif');
  dEl.textContent = "●".repeat(d) + "○".repeat(3 - d);
  dEl.className = "dif d" + d;
  dEl.title = "Dificultad: " + DIF_NOMBRE[d];
  document.getElementById('titulo').textContent = p.titulo;
  document.getElementById('dibujo').innerHTML = "<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>" + PAPEL + (DIBUJOS[idx] || DEFECTO) + "</svg>";
  document.getElementById('enun').textContent = p.enun;
  document.getElementById('sol').innerHTML = p.sol;
  const fig = document.getElementById('solfig');
  if(p.fig){ fig.innerHTML = p.fig; fig.classList.add('show'); }
  else { fig.innerHTML=''; fig.classList.remove('show'); }
  document.getElementById('solwrap').classList.remove('show');
  document.getElementById('verbtn').innerHTML = "<span>💡</span> Ver solución";
  // pistas: media -> 1 botón ("Pista"); difícil -> 2 botones independientes ("Pista 1", "Pista 2"); fácil -> ninguno
  const arrP = PISTAS[idx] || [];
  const b1 = document.getElementById('pistabtn1'), b2 = document.getElementById('pistabtn2');
  document.getElementById('pistawrap1').classList.remove('show');
  document.getElementById('pistawrap2').classList.remove('show');
  if(arrP.length >= 1){
    const et1 = arrP.length > 1 ? "Pista 1" : "Pista";
    b1.style.display = ""; b1.dataset.et = et1; b1.innerHTML = "<span>💭</span> " + et1;
    document.getElementById('pistalabel1').innerHTML = "<span>💭</span> " + et1;
    document.getElementById('pista1').innerHTML = arrP[0];
  } else { b1.style.display = "none"; }
  if(arrP.length >= 2){
    b2.style.display = ""; b2.innerHTML = "<span>💭</span> Pista 2";
    document.getElementById('pista2').innerHTML = arrP[1];
  } else { b2.style.display = "none"; }
  document.getElementById('prev').disabled = (viewIdx<=0);
  document.getElementById('next').disabled = (viewIdx>=hoyIdx);
  document.getElementById('hoy').disabled = (viewIdx===hoyIdx);
  // re-lanzar la animación de entrada de la tarjeta
  const c = document.getElementById('card');
  c.style.animation='none'; void c.offsetWidth; c.style.animation='';
}
document.getElementById('verbtn').onclick = ()=>{
  const w=document.getElementById('solwrap'), b=document.getElementById('verbtn');
  const abierto = w.classList.toggle('show');
  b.innerHTML = abierto ? "<span>🙈</span> Ocultar solución" : "<span>💡</span> Ver solución";
};
document.getElementById('pistabtn1').onclick = ()=>{
  const b=document.getElementById('pistabtn1'), w=document.getElementById('pistawrap1'), et=b.dataset.et||"Pista";
  const abierto = w.classList.toggle('show');
  b.innerHTML = abierto ? "<span>🙈</span> Ocultar "+et.toLowerCase() : "<span>💭</span> "+et;
};
document.getElementById('pistabtn2').onclick = ()=>{
  const b=document.getElementById('pistabtn2'), w=document.getElementById('pistawrap2');
  const abierto = w.classList.toggle('show');
  b.innerHTML = abierto ? "<span>🙈</span> Ocultar pista 2" : "<span>💭</span> Pista 2";
};
document.getElementById('prev').onclick = ()=>{ if(viewIdx>0){viewIdx--; render();} };
document.getElementById('next').onclick = ()=>{ if(viewIdx<hoyIdx){viewIdx++; render();} };
document.getElementById('hoy').onclick = ()=>{ viewIdx=hoyIdx; render(); };
document.getElementById('share').onclick = async ()=>{
  const p=problemaDe(viewIdx);
  const url = location.href.split('#')[0];
  const b = document.getElementById('share');
  try{
    if(navigator.share){ await navigator.share({title:"🧩 "+p.titulo, text:"El problema matemático del día", url}); }
    else { await navigator.clipboard.writeText(url); const t=b.textContent; b.textContent="✅ ¡Enlace copiado!"; setTimeout(()=>b.textContent=t,1800); }
  }catch(e){}
};
render();
</script>
</body>
</html>
